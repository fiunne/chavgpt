<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChavGPT - Inteligencia Artificial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ececf1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; /* Usa dynamic viewport height para móviles */
            width: 100vw;
            overflow: hidden;
        }

        .app-container {
            background-color: #2d2d2d;
            width: 100%;
            max-width: 450px;
            height: 100%; /* Ocupa todo el alto en móvil */
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            padding: 15px;
            text-align: center;
            background-color: #252525;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }

        .logo-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 10px auto;
            border-radius: 15px; /* Cuadrado redondeado para que se lea el texto de la imagen */
            overflow: hidden;
            border: 2px solid #10a37f;
            background-color: white;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Para que no se corte el texto "ChavGPT Correcto" */
        }

        h1 { font-size: 1.5rem; color: white; }
        .tagline { font-size: 0.8rem; color: #9ea1a6; }

        /* Área de Chat - Autoajustable */
        .chat-area {
            flex: 1; /* Esto hace que ocupe TODO el espacio sobrante */
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .response-bubble {
            background-color: #3e3e3e;
            padding: 15px;
            border-radius: 15px 15px 15px 0;
            max-width: 90%;
            border: 1px solid #555;
            margin-bottom: 10px;
        }

        #statusText { color: #aaa; font-style: italic; font-size: 0.9rem; }
        #answerText { color: #10a37f; font-weight: bold; font-size: 1.2rem; display: none; }

        /* Input - FIJO ABAJO */
        .input-area {
            padding: 20px;
            background-color: #252525;
            border-top: 1px solid #444;
            display: flex;
            gap: 8px;
            flex-shrink: 0; /* Prohibido que desaparezca */
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 20px;
            border: 1px solid #555;
            background-color: #3a3a3a;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: #10a37f;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo-wrapper">
                <img src="chavgpt1.jpg" alt="ChavGPT Logo" class="logo-image">
            </div>
            <h1>ChavGPT</h1>
            <p class="tagline">La IA que siempre tiene razón, pero no yerba.</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="response-bubble">
                <p id="statusText">Pregúntame lo que quieras...</p>
                <p id="answerText">Correcto.</p>
            </div>
        </div>

        <form class="input-area" id="mainForm">
            <input type="text" id="userInput" placeholder="Escribe aquí..." required autocomplete="off">
            <button type="submit">Enviar</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('mainForm');
        const input = document.getElementById('userInput');
        const answer = document.getElementById('answerText');
        const status = document.getElementById('statusText');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            answer.style.display = "none";
            status.style.display = "block";
            status.innerHTML = "<em>Analizando consulta...</em>";

            setTimeout(() => {
                status.style.display = "none";
                answer.style.display = "block";
                input.value = "";
            }, 800);
        });
    </script>
</body>
</html>
