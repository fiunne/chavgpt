<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChavGPT - Inteligencia Artificial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ececf1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
        }

        .app-container {
            background-color: #2d2d2d;
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Header */
        .header {
            padding: 15px;
            text-align: center;
            background-color: #252525;
            border-bottom: 1px solid #444;
            flex-shrink: 0;
        }

        .logo-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 10px auto;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #10a37f;
            background-color: white;
        }

        .logo-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h1 { font-size: 1.5rem; color: white; }
        .tagline { font-size: 0.8rem; color: #9ea1a6; }

        /* Área de Chat */
        .chat-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra el mensaje de bienvenida */
            overflow-y: auto;
        }

        /* Estilo de mensaje de sistema (no parece un botón ni un input) */
        .system-message {
            text-align: center;
            padding: 20px;
            border: 1px dashed #555;
            border-radius: 10px;
            background-color: rgba(255,255,255,0.05);
        }

        #statusText { 
            color: #999; 
            font-size: 1.1rem;
            line-height: 1.4;
        }

        #answerText { 
            color: #10a37f; 
            font-weight: bold; 
            font-size: 1.8rem; 
            display: none; 
            text-align: center;
            margin-top: 10px;
        }

        /* Input FIJO ABAJO */
        .input-area {
            padding: 20px;
            background-color: #252525;
            border-top: 1px solid #444;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 25px;
            border: 2px solid #10a37f; /* Color llamativo para que sepa que AQUÍ se escribe */
            background-color: #3a3a3a;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            background-color: #10a37f;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <div class="logo-wrapper">
                <img src="chavgpt1.jpg" alt="ChavGPT Logo" class="logo-image">
            </div>
            <h1>ChavGPT</h1>
            <p class="tagline">Infalible. Indiscutible. Único.</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="system-message">
                <p id="statusText">Preguntame lo que quieras, pero no me pidas yerba</p>
                <p id="answerText">Correcto.</p>
            </div>
        </div>

        <form class="input-area" id="mainForm">
            <input type="text" id="userInput" placeholder="Escribe tu pregunta aquí..." required autocomplete="off">
            <button type="submit">Enviar</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('mainForm');
        const input = document.getElementById('userInput');
        const answer = document.getElementById('answerText');
        const status = document.getElementById('statusText');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Animación de carga
            answer.style.display = "none";
            status.style.display = "block";
            status.innerHTML = "<em>Analizando tu brillante planteo...</em>";

            setTimeout(() => {
                status.style.display = "none";
                answer.style.display = "block";
                input.value = "";
            }, 800);
        });
    </script>
</body>
</html>
