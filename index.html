<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChavGPT - Inteligencia Artificial</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #212121;
            color: #ececf1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 2px solid #444;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            color: #ffffff;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #9ea1a6;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .chat-box {
            background-color: #2f2f2f;
            border-radius: 12px;
            padding: 25px;
            min-height: 80px;
            margin-bottom: 20px;
            text-align: left;
            border: 1px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .response-text {
            color: #10a37f;
            font-weight: 600;
            font-size: 1.4rem;
            display: none;
        }

        .waiting {
            color: #666;
            font-style: italic;
        }

        .input-area {
            position: relative;
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 50px 16px 16px;
            border-radius: 12px;
            border: 1px solid #555;
            background-color: #353541;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border 0.3s;
        }

        input[type="text"]:focus {
            border-color: #10a37f;
        }

        button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background-color: #10a37f;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 7px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #1a7f64;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="chavgpt1.jpg" alt="ChavGPT Logo" class="logo">
    </div>
    
    <h1>ChavGPT</h1>
    <p class="subtitle">La IA que siempre tiene la razón</p>

    <div class="chat-box" id="chatContainer">
        <div id="statusText" class="waiting">Haz tu pregunta...</div>
        <div id="answer" class="response-text">Correcto.</div>
    </div>

    <form class="input-area" id="qaForm">
        <input type="text" id="userInput" placeholder="Escribe tu duda aquí..." required autocomplete="off">
        <button type="submit">Enviar</button>
    </form>
</div>

<script>
    const form = document.getElementById('qaForm');
    const input = document.getElementById('userInput');
    const answer = document.getElementById('answer');
    const statusText = document.getElementById('statusText');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Efecto visual de "pensando"
        answer.style.display = "none";
        statusText.style.display = "block";
        statusText.innerText = "Procesando respuesta lógica...";

        setTimeout(() => {
            statusText.style.display = "none";
            answer.style.display = "block";
            input.value = ""; // Limpiar el input
        }, 1000);
    });
</script>

</body>
</html>
